<!-- tecnologia.html -->
<div class="home-container">
  
  <header class="home-header">
  <h1>Tecnología</h1>
  </header>
  <main>
    <section class="news-grid">
    <article class="news-card">
      <div class="card-image">
<ul class="results-list">
  <li *ngFor="let product of resultadosDeBusqueda" class="result-item">
      <img [src]="product.imageUrl" alt="{{ product.title }}" class="image-placeholder"/>
      <div class="card-content">
        <span class="category tag-tech">{{ product.category }}</span>
        <span class="card-date"></span>
        <h4>{{ product.title }}</h4>
        <p>{{ product.leadText }}</p>
        
        
        <!--no se coloca la barra al inicio de routerLink 
        porque en la base ya se le agrego junto a la ruta-->
    <a routerLink="{{product.angularRoute}}" class="read-more-btn">Leer noticia completa → </a> 
      </div>
  </li>
</ul>
    </article>
    </section>
  </main>
</div>
