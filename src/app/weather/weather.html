<div *ngIf="temperature !== null">
  <div>
    <span >🌡</span>
    <p>Temperatura: {{ temperature }}°C</p>
  
      <span>💨</span>
    <p>Viento: {{ windSpeed }} km/h</p>
 
  <span >🕒</span>
    <p>Momento del día: {{ isDay ? 'Día' : 'Noche' }}</p>
 <span>🌤️</span>
    <p>Estado del clima: {{ getWeatherDescription(weatherCode) }}</p>
  </div>
  
</div>
