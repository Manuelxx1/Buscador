

<div *ngIf="temperature !== null" class="weather-card">
  <div class="weather-grid">
    
    <div class="weather-item">
      <span class="weather-icon">🌡</span>
      <p class="weather-text">Temperatura: <span>{{ temperature }}°C</span></p>
    </div>
  
    <div class="weather-item">
      <span class="weather-icon">💨</span>
      <p class="weather-text">Viento: <span>{{ windSpeed }} km/h</span></p>
    </div>
 
    <div class="weather-item">
      <span class="weather-icon">🕒</span>
      <p class="weather-text">Momento del día: <span>{{ isDay ? 'Día' : 'Noche' }}</span></p>
    </div>

    <div class="weather-item">
      <span class="weather-icon">🌤️</span>
      <p class="weather-text">Estado del clima: <span>{{ getWeatherDescription(weatherCode) }}</span></p>
    </div>

  </div>
</div>
